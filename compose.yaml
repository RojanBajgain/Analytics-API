services:
  app:
    image: analytic-api:v1
    build:
      context: .
      dockerfile: Dockerfile.web

    environment:
      - PORT=8002

    env_file:
      - .env

    ports:
      - "8002:8002"

    command: uv run uvicorn src.app:app --host 0.0.0.0 --port 8002 --reload

    volumes:
      - ./src:/app/src

    develop:
      watch:
        - action: rebuild
          path: Dockerfile.web
        - action: rebuild
          path: compose.yaml